<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="우리 가계부">
<meta name="theme-color" content="#0F1117">
<link rel="manifest" href="manifest.json">
<title>우리 가계부</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1117;
    --surface: #1A1D27;
    --surface2: #22263A;
    --border: #2E3350;
    --accent: #5B6EF5;
    --accent2: #7C8FFF;
    --green: #2ECC8A;
    --red: #F06060;
    --orange: #F5A623;
    --yellow: #FFD166;
    --purple: #A78BFA;
    --text: #F0F2FF;
    --text2: #8B90B8;
    --text3: #555A7A;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 130px; }

  /* Header */
  .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 18px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .app-title { font-size: 17px; font-weight: 700; }
  .app-title span { color: var(--accent2); }
  .sync-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Month tabs */
  .month-tabs { display: flex; gap: 3px; overflow-x: auto; scrollbar-width: none; }
  .month-tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; font-size: 12px; font-weight: 500; color: var(--text3); padding: 8px 12px; border-radius: 8px 8px 0 0; cursor: pointer; border: 1px solid transparent; border-bottom: none; transition: all 0.15s; }
  .tab.active { background: var(--bg); color: var(--accent2); border-color: var(--border); font-weight: 700; }
  .tab.has-data { color: var(--text2); }

  /* Content */
  .content { padding: 14px; }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; }
  .kpi-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
  .kpi-value { font-size: 19px; font-weight: 900; letter-spacing: -0.5px; }
  .kpi-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

  /* Fixed/var bar */
  .fv-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; margin-bottom: 14px; }
  .fv-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .fv-label { font-size: 11px; display: flex; align-items: center; gap: 4px; color: var(--text2); }
  .fv-dot { width: 7px; height: 7px; border-radius: 50%; }
  .bar-track { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; display: flex; }
  .bar-fixed { height: 100%; background: var(--purple); transition: width 0.5s; }
  .bar-var { height: 100%; background: var(--orange); transition: width 0.5s; }

  /* Who filter */
  .who-filter { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 14px; }
  .who-filter::-webkit-scrollbar { display: none; }
  .who-btn { flex-shrink: 0; font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .who-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }

  /* Section */
  .section { margin-bottom: 14px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .section-title { font-size: 13px; font-weight: 700; }
  .section-badge { font-size: 11px; color: var(--text2); }

  /* Transaction */
  .tx-list { display: flex; flex-direction: column; gap: 6px; }
  .tx-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .tx-left { display: flex; align-items: center; gap: 9px; }
  .tx-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .tx-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .tx-meta { font-size: 11px; color: var(--text2); }
  .tx-right { display: flex; align-items: center; gap: 7px; }
  .tx-amount { font-size: 14px; font-weight: 700; }
  .del-btn { background: none; border: none; color: var(--text3); font-size: 14px; padding: 3px 5px; cursor: pointer; }

  /* Badges */
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
  .badge-fixed { background: #2D2460; color: var(--purple); }
  .badge-var { background: #3D2800; color: var(--orange); }
  .badge-who { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

  /* FAB */
  .fab { position: fixed; bottom: 80px; right: 18px; width: 54px; height: 54px; border-radius: 16px; background: var(--accent); color: white; font-size: 26px; border: none; cursor: pointer; box-shadow: 0 6px 20px rgba(91,110,245,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; transition: transform 0.15s; }
  .fab:active { transform: scale(0.92); }

  /* Bottom nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 0 18px; z-index: 150; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 5px; cursor: pointer; }
  .nav-icon { font-size: 19px; }
  .nav-label { font-size: 10px; color: var(--text3); font-weight: 500; }
  .nav-btn.active .nav-label { color: var(--accent2); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 22px 22px 0 0; padding: 18px; width: 100%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(.32,1,.23,1); max-height: 92vh; overflow-y: auto; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

  /* Form */
  .form-group { margin-bottom: 13px; }
  .form-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; font-weight: 600; display: block; letter-spacing: 0.3px; }
  .seg-control { display: flex; background: var(--surface2); border-radius: 9px; padding: 3px; gap: 2px; }
  .seg-btn { flex: 1; text-align: center; padding: 8px; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; color: var(--text2); transition: all 0.15s; border: none; background: none; font-family: inherit; }
  .seg-btn.active { background: var(--surface); color: var(--text); }
  .seg-btn.active.is-income { color: var(--green); }
  .seg-btn.active.is-expense { color: var(--red); }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 12px; padding: 7px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .chip.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }
  .submit-btn { width: 100%; background: var(--accent); color: white; border: none; border-radius: 12px; padding: 15px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 4px; }
  .submit-btn:active { opacity: 0.85; }

  /* Budget */
  .budget-list { display: flex; flex-direction: column; gap: 7px; }
  .budget-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; }
  .budget-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .budget-cat { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .budget-amt { font-size: 11px; color: var(--text2); }
  .budget-amt b { color: var(--text); }
  .prog-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

  /* Annual */
  .annual-list { display: flex; flex-direction: column; gap: 7px; }
  .annual-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px; cursor: pointer; }
  .annual-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .annual-month { font-size: 14px; font-weight: 700; }
  .annual-detail { display: flex; gap: 14px; font-size: 11px; color: var(--text2); }

  /* Empty */
  .empty { text-align: center; padding: 50px 20px; color: var(--text3); }
  .empty-icon { font-size: 44px; margin-bottom: 10px; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Fixed view */
  .fixed-total { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .fixed-total-label { font-size: 12px; color: var(--text2); }
  .fixed-total-val { font-size: 20px; font-weight: 900; color: var(--purple); }

  /* Year nav */
  .year-nav { display: flex; align-items: center; gap: 8px; }
  .year-btn { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1; }
  .year-label { font-size: 13px; font-weight: 700; color: var(--text); min-width: 50px; text-align: center; }

  /* Calendar */
  .cal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; margin-bottom: 14px; }
  .cal-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { font-size: 10px; color: var(--text3); text-align: center; padding: 4px 0; font-weight: 600; }
  .cal-dow:first-child { color: var(--red); }
  .cal-dow:last-child { color: #5B8DEF; }
  .cal-cell { text-align: center; padding: 6px 2px; border-radius: 8px; min-height: 48px; cursor: pointer; transition: background 0.1s; }
  .cal-cell:hover { background: var(--surface2); }
  .cal-cell.today { background: var(--surface2); }
  .cal-cell.selected { background: var(--accent); border-radius: 8px; }
  .cal-cell.selected .cal-day { color: white !important; }
  .cal-cell.selected .cal-amt { color: rgba(255,255,255,0.8) !important; }
  .cal-day-detail { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; margin-bottom: 14px; animation: fadeIn 0.2s ease; }
  .cal-day-detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .cal-day-detail-title { font-size: 13px; font-weight: 700; }
  .cal-day-detail-close { background: none; border: none; color: var(--text3); font-size: 16px; cursor: pointer; padding: 2px 6px; }
  .cal-day { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .cal-cell:nth-child(7n+1) .cal-day { color: var(--red); }
  .cal-cell:nth-child(7n) .cal-day { color: #5B8DEF; }
  .cal-cell.empty .cal-day { visibility: hidden; }
  .cal-amt { font-size: 9px; color: var(--red); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal-amt.income { color: var(--green); }

  /* Cal section toggle icons */
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .cal-header-icons { display: flex; gap: 8px; }
  .cal-icon-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 9px; font-size: 14px; cursor: pointer; transition: all 0.15s; }
  .cal-icon-btn.active { background: var(--accent); border-color: var(--accent); }

  /* Who bar chart */
  .who-chart { display: flex; flex-direction: column; gap: 10px; padding: 6px 0; }
  .who-bar-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .who-bar-name { font-size: 12px; font-weight: 600; width: 36px; flex-shrink: 0; text-align: center; }
  .who-bar-track { flex: 1; height: 28px; background: var(--surface2); border-radius: 6px; overflow: visible; position: relative; }
  .who-bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 700; color: white; min-width: 0; transition: width 0.4s; white-space: nowrap; }
  .who-bar-amt { font-size: 11px; color: var(--text2); width: 75px; text-align: right; flex-shrink: 0; }

  /* Who detail (category breakdown) */
  .who-detail-back { font-size: 12px; color: var(--accent2); cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }

  /* Category grid */
  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .cat-box:hover { border-color: var(--accent); }
  .cat-box-icon { font-size: 22px; margin-bottom: 4px; }
  .cat-box-name { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .cat-box-amt { font-size: 13px; font-weight: 700; color: var(--text); }

  /* Budget mini in monthly */
  .budget-mini { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; margin-bottom: 14px; }
  .budget-mini-title { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 10px; display: flex; justify-content: space-between; }
  .budget-mini-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .budget-mini-cat { font-size: 11px; color: var(--text2); width: 52px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .budget-mini-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .budget-mini-fill { height: 100%; border-radius: 3px; transition: width 0.4s; min-width: 0; }
  .budget-mini-pct { font-size: 10px; color: var(--text3); width: 30px; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div><div class="app-title">🏠 <span>우리 가계부</span></div><div style="font-size:9px;color:var(--text3);margin-top:1px">by 신천동 부자아빠</div></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="year-nav">
        <button class="year-btn" onclick="changeYear(-1)">‹</button>
        <div class="year-label" id="yearLabel">2025년</div>
        <button class="year-btn" onclick="changeYear(1)">›</button>
      </div>
      <div class="sync-badge"><div class="sync-dot"></div><span id="syncStatus">연결중...</span></div>
    </div>
  </div>
  <div class="month-tabs" id="monthTabs"></div>
</div>

<div class="content" id="mainContent"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>

<button class="fab" id="fabBtn">+</button>

<div class="bottom-nav">
  <div class="nav-btn active" onclick="switchView('monthly')" id="nav-monthly"><div class="nav-icon">📅</div><div class="nav-label">월별</div></div>
  <div class="nav-btn" onclick="switchView('annual')" id="nav-annual"><div class="nav-icon">📊</div><div class="nav-label">연간</div></div>
  <div class="nav-btn" onclick="switchView('budget')" id="nav-budget"><div class="nav-icon">🎯</div><div class="nav-label">예산</div></div>
  <div class="nav-btn" onclick="switchView('fixed')" id="nav-fixed"><div class="nav-icon">📌</div><div class="nav-label">고정비</div></div>
</div>

<!-- Add Transaction Modal -->
<div class="modal-overlay" id="txModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title" style="margin-bottom:0">거래 추가</div>
      <button onclick="document.getElementById('txModal').classList.remove('open')" style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:4px 8px">✕</button>
    </div>
    <div class="form-group">
      <div class="seg-control">
        <button class="seg-btn active is-expense" id="seg-expense" onclick="selectType('expense')">지출</button>
        <button class="seg-btn is-income" id="seg-income" onclick="selectType('income')">수입</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">금액</label>
      <input class="form-input" type="text" id="amountInput" placeholder="0" inputmode="numeric" oninput="formatAmountInput(this)">
    </div>
    <div class="form-group">
      <label class="form-label">지출 주체</label>
      <div class="chip-grid" id="whoGrid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <div class="chip-grid" id="catGrid"></div>
    </div>
    <div class="form-group" id="costTypeGroup">
      <label class="form-label">비용 유형</label>
      <div class="seg-control">
        <button class="seg-btn" id="seg-fixed" onclick="selectCostType('고정비')">고정비</button>
        <button class="seg-btn active" id="seg-variable" onclick="selectCostType('변동비')">변동비</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">내용 (선택)</label>
      <input class="form-input" type="text" id="memoInput" placeholder="메모...">
    </div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <input class="form-input" type="date" id="dateInput">
    </div>
    <div class="form-group">
      <label class="form-label">결제수단</label>
      <div class="chip-grid" id="payGrid"></div>
    </div>
    <button class="submit-btn" onclick="addTransaction()">저장하기</button>
  </div>
</div>

<!-- Budget Modal -->
<div class="modal-overlay" id="budgetModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title" style="margin-bottom:0">예산 설정</div>
      <button onclick="document.getElementById('budgetModal').classList.remove('open')" style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:4px 8px">✕</button>
    </div>
    <div id="budgetEditContent"></div>
    <button class="submit-btn" onclick="saveBudgets()">저장하기</button>
  </div>
</div>

<!-- Fixed Item Edit Modal -->
<div class="modal-overlay" id="fixedModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title" id="fixedModalTitle" style="margin-bottom:0">고정비 추가</div>
      <button onclick="document.getElementById('fixedModal').classList.remove('open')" style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:4px 8px">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">항목명</label>
      <input class="form-input" type="text" id="fixedName" placeholder="예: 월세, 넷플릭스...">
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <div class="chip-grid" id="fixedCatGrid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">결제일</label>
      <input class="form-input" type="number" id="fixedDay" placeholder="1~31" min="1" max="31" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">금액</label>

async function registerFixedThisMonth() {
  if (!fixedItems.length) { alert('고정비 항목이 없어요'); return; }
  if (!confirm('이번달 고정비를 등록/갱신할까요?\n(기존 자동등록 내역은 삭제 후 새로 등록됩니다)')) return;

  const now = new Date();
  const y = now.getFullYear();
  const mon = now.getMonth(); // 0-based

  // 1단계: 이미 로드된 allTxs에서 이번달 [자동] 고정비 ID 추출
  const toDeleteIds = allTxs
    .filter(tx => {

        && tx.cost_type === '고정비'

    .map(tx => tx.id);

  for (const id of toDeleteIds) {

}

// ── Annual view ───────────────────────────────────
function renderAnnual() {
  // 월별 데이터 수집
  const monthData = [];
  MONTHS.forEach((m, i) => {
    const txs = getMonthTxs(currentYear, i);
    const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const bal = income - expense;
    monthData.push({ month: m, idx: i, txs, income, expense, bal, hasData: txs.length > 0 });
  });

  // 꺾은선 그래프 (데이터 있는 달만)
  const dataPoints = monthData.filter(d => d.hasData);
  let chartHtml = '';
  if (dataPoints.length > 0) {
    const vals = dataPoints.map(d => d.bal);
    const maxVal = Math.max(...vals.map(Math.abs), 1);
    const svgW = 320, svgH = 140, padX = 35, padY = 20;
    const chartW = svgW - padX * 2, chartH = svgH - padY * 2;

    // 포인트 좌표 계산
    const points = dataPoints.map((d, i) => {
      const x = padX + (dataPoints.length === 1 ? chartW / 2 : (i / (dataPoints.length - 1)) * chartW);
      const y = padY + chartH / 2 - (d.bal / maxVal) * (chartH / 2);
      return { x, y, d };
    });

    // 0선 위치
    const zeroY = padY + chartH / 2;

    let pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');

    chartHtml = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">📈 월별 저축 추세</div>
      <svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:auto">
        <line x1="${padX}" y1="${zeroY}" x2="${svgW-padX}" y2="${zeroY}" stroke="var(--border)" stroke-width="1" stroke-dasharray="4"/>
        <path d="${pathD}" fill="none" stroke="var(--accent2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${points.map(p => `
          <circle cx="${p.x}" cy="${p.y}" r="4" fill="${p.d.bal>=0?'var(--green)':'var(--red)'}" stroke="var(--surface)" stroke-width="2"/>
          <text x="${p.x}" y="${p.y - 10}" text-anchor="middle" fill="var(--text2)" font-size="8" font-weight="600">${p.d.bal>=0?'+':''}${(p.d.bal/10000).toFixed(0)}만</text>
          <text x="${p.x}" y="${zeroY + 14}" text-anchor="middle" fill="var(--text3)" font-size="8">${p.d.month}</text>
        `).join('')}
      </svg>
    </div>`;
  }

  let html = chartHtml;
  html += `<div class="section"><div class="section-header"><div class="section-title">연간 요약 (${currentYear})</div></div><div class="annual-list">`;
  let hasAny = false;
  monthData.forEach(d => {
    if (!d.hasData) return;
    hasAny = true;
    html += `<div class="annual-item" onclick="currentMonth=${d.idx};switchView('monthly')">
      <div class="annual-top"><div class="annual-month">${d.month}</div><div style="font-size:14px;font-weight:700;color:${d.bal>=0?'var(--green)':'var(--red)'}">${d.bal>=0?'+':'-'}${fmt(d.bal)}원</div></div>
      <div class="annual-detail"><span>💚 ${fmt(d.income)}</span><span>🔴 ${fmt(d.expense)}</span><span>${d.txs.length}건</span></div>
    </div>`;
  });
  if (!hasAny) html += `<div class="empty"><div class="empty-icon">📊</div><p>데이터가 없어요</p></div>`;
  html += `</div></div>`;
  document.getElementById('mainContent').innerHTML = html;
}

// ── Budget view ───────────────────────────────────
function renderBudgetView() {
  const txs = getMonthTxs(currentYear, currentMonth);
  let html = `<div class="section"><div class="section-header"><div class="section-title">예산 현황 · ${MONTHS[currentMonth]}</div><div class="section-badge" style="cursor:pointer;color:var(--accent2)" onclick="openBudgetModal()">✏️ 수정</div></div><div class="budget-list">`;
  CATS_EXP.forEach(cat => {
    const bud = budgets[cat] || 0;
    const act = txs.filter(t=>t.type==='expense'&&t.category===cat).reduce((s,t)=>s+t.amount,0);
    if (!bud && !act) return;
    const pct = bud > 0 ? Math.min(act/bud, 1) : 0;
    const pctN = bud > 0 ? Math.round(act/bud*100) : 0;
    const color = pctN>=100 ? 'var(--red)' : pctN>=80 ? 'var(--orange)' : 'var(--green)';
    html += `<div class="budget-item">
      <div class="budget-row">
        <div class="budget-cat">${ICONS[cat]||'📝'} ${cat}</div>
        <div class="budget-amt"><b>${fmt(act)}</b> / ${fmt(bud)}원 (${pctN}%)</div>

async function saveFixedItem() {
  const name = document.getElementById('fixedName').value.trim();
  const day = parseInt(document.getElementById('fixedDay').value);
  const amount = parseInt(document.getElementById('fixedAmount').value);
  if (!name || !day || !amount) { alert('항목명, 결제일, 금액을 입력해주세요'); return; }

  const payload = { name, category: selFixedCat, day, amount, payment: selFixedPay, who: selFixedWho };
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const dateStr = `${y}-${m}-${String(Math.min(day, 28)).padStart(2,'0')}`;

  if (editingFixedId) {
    // fixed_items 업데이트
    const oldItem = fixedItems.find(f => f.id === editingFixedId);
    await sb.from('fixed_items').update(payload).eq('id', editingFixedId);

    // 이번 달 해당 항목 거래내역 찾기 (fixed_item_id 우선, 없으면 memo로 fallback)
    let { data: txs } = await sb.from('transactions')
      .select('id')
      .eq('fixed_item_id', editingFixedId)
      .gte('date', `${y}-${m}-01`)
      .lte('date', `${y}-${m}-31`);

    if (!txs || txs.length === 0) {
      // fixed_item_id로 못 찾으면 이전 이름의 memo로 검색
      const oldMemo = oldItem ? '[자동]' + oldItem.name : null;
      if (oldMemo) {
        const { data: memoTxs } = await sb.from('transactions')
          .select('id')
          .eq('cost_type', '고정비')
          .eq('memo', oldMemo)
          .gte('date', `${y}-${m}-01`)
          .lte('date', `${y}-${m}-31`)
          .limit(1);
        txs = memoTxs;
      }
    }

    if (txs && txs.length > 0) {
      await sb.from('transactions').update({
        memo: '[자동]' + name, category: selFixedCat,
        amount, payment: selFixedPay, who: selFixedWho, date: dateStr,
        fixed_item_id: editingFixedId
      }).eq('id', txs[0].id);
      showToast('✅ 수정됐어요');
    } else {
      showToast('✅ 저장됐어요. 이번달 반영은 "📥 이번달 등록" 버튼을 눌러주세요');
    }
  } else {
    // 신규 추가 → fixed_items에 추가 후 생성된 id로 거래내역 1건 insert
    const { data: inserted } = await sb.from('fixed_items').insert([payload]).select();
    if (inserted && inserted[0]) {
      await sb.from('transactions').insert([{
        date: dateStr, type: 'expense', cost_type: '고정비',
        category: selFixedCat, memo: '[자동]' + name,
        amount, payment: selFixedPay, who: selFixedWho,
        fixed_item_id: inserted[0].id
      }]);
    }
    showToast(`✅ ${name} 추가됐어요`);
  }

  document.getElementById('fixedModal').classList.remove('open');
  await loadFixedItems();
  await loadTransactions();
  renderFixedView();
}

async function deleteFixed(id) {
  if (!confirm('삭제할까요?')) return;
  await sb.from('fixed_items').delete().eq('id', id);
  // fixed_item_id로 이번 달 거래내역 삭제
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const { data: txs } = await sb.from('transactions')
    .select('id')
    .eq('fixed_item_id', id)
    .gte('date', `${y}-${m}-01`)
    .lte('date', `${y}-${m}-31`);
  if (txs && txs.length > 0) {
    await sb.from('transactions').delete().in('id', txs.map(t => t.id));
  }
  await loadFixedItems();
  await loadTransactions();
  renderFixedView();
  showToast('🗑 삭제됐어요');
}

async function addTransaction() {
  const amount = getAmountValue();
  if (!amount || amount <= 0) { alert('금액을 입력해주세요'); return; }
  const btn = document.querySelector('#txModal .submit-btn');
  const isEdit = !!editingTxId;
  btn.textContent = isEdit ? '수정 중...' : '저장 중...'; btn.disabled = true;

  const payload = {
    date: document.getElementById('dateInput').value,
    type: txType,
    cost_type: txType==='income' ? '수입' : costType,
    category: selCat,
    memo: document.getElementById('memoInput').value,
    amount: amount,
    payment: selPay,
    who: selWho
  };

  try {
    if (isEdit) {
      const { error } = await sb.from('transactions').update(payload).eq('id', editingTxId);
      if (error) throw error;
      showToast('✅ 수정됐어요');
    } else {
      const { error } = await sb.from('transactions').insert([payload]);
      if (error) throw error;
    }
    editingTxId = null;
    document.getElementById('txModal').classList.remove('open');
  } catch(e) {
    alert('저장 실패: ' + e.message);
  } finally {
    btn.textContent = isEdit ? '수정하기' : '저장하기'; btn.disabled = false;
  }
}

// ── Swipe to change month ────────────────────────
(function() {
  let startX = 0, startY = 0, swiping = false;
  const content = document.getElementById('mainContent');
  content.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
  }, { passive: true });
  content.addEventListener('touchend', e => {
    if (!swiping) return;
    swiping = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) {
        // swipe left → next month
        if (currentMonth === 11) { currentMonth = 0; currentYear++; document.getElementById('yearLabel').textContent = currentYear + '년'; }
        else { currentMonth++; }
      } else {
        // swipe right → prev month
        if (currentMonth === 0) { currentMonth = 11; currentYear--; document.getElementById('yearLabel').textContent = currentYear + '년'; }
        else { currentMonth--; }
      }
      renderMonthTabs();
      render();
    }
  }, { passive: true });
})();

function goBack() {

// ── Calendar / Analysis section ──────────────────
function renderCalSection(year, month, txs) {
  const expTxs = txs.filter(t => t.type === 'expense');
  const incTxs = txs.filter(t => t.type === 'income');
  const isExp = calTxType === 'expense';
  const filteredTxs = isExp ? expTxs : incTxs;
  const typeLabel = isExp ? '지출' : '수입';

  let html = `<div class="cal-card">`;
  html += `<div class="cal-header">
    <div class="cal-title" style="margin-bottom:0">`;
  if (viewHistory.length > 0) {
    html += `<span onclick="goBack()" style="cursor:pointer;margin-right:6px;color:var(--accent2)">‹</span>`;
  }
  if (calMode === 'calendar') html += `📆 ${MONTHS[month]} 수입/지출 달력`;
  else if (calMode === 'who') html += `👥 ${MONTHS[month]} 구성원별 ${typeLabel}`;
  else if (calMode === 'who-detail') html += `👤 ${calSelectedWho} ${typeLabel} 내역`;
  else if (calMode === 'category') html += `📊 ${MONTHS[month]} 카테고리별 ${typeLabel}`;
  else if (calMode === 'cat-detail') html += `${ICONS[calSelectedCat]||'📝'} ${calSelectedCat} ${typeLabel} 내역`;
  html += `</div>
    <div class="cal-header-icons">
      <div class="cal-icon-btn${calMode==='calendar'?' active':''}" onclick="calMode='calendar';viewHistory=[];selectedCalDay=null;render()">📆</div>
      <div class="cal-icon-btn${calMode.startsWith('who')?' active':''}" onclick="calMode='who';viewHistory=[];calSelectedWho=null;render()">👥</div>
      <div class="cal-icon-btn${calMode.startsWith('cat')?' active':''}" onclick="calMode='category';viewHistory=[];calSelectedCat=null;render()">📊</div>
    </div>
  </div>`;

  // 구성원/카테고리 뷰에서 지출/수입 토글 표시
  if (calMode !== 'calendar') {
    html += `<div style="display:flex;gap:4px;margin-bottom:10px">
      <button onclick="calTxType='expense';render()" style="flex:1;padding:6px;border-radius:8px;border:1px solid ${isExp?'var(--red)':'var(--border)'};background:${isExp?'rgba(240,96,96,0.15)':'var(--surface2)'};color:${isExp?'var(--red)':'var(--text3)'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🔴 지출</button>
      <button onclick="calTxType='income';render()" style="flex:1;padding:6px;border-radius:8px;border:1px solid ${!isExp?'var(--green)':'var(--border)'};background:${!isExp?'rgba(46,204,138,0.15)':'var(--surface2)'};color:${!isExp?'var(--green)':'var(--text3)'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">💚 수입</button>
    </div>`;
  }

  if (calMode === 'calendar') {
    html += renderCalGrid(year, month, txs);
  } else if (calMode === 'who') {
    html += renderWhoChart(filteredTxs);
  } else if (calMode === 'who-detail') {
    html += renderWhoDetail(filteredTxs);
  } else if (calMode === 'category') {
    html += renderCatAnalysis(filteredTxs);
  } else if (calMode === 'cat-detail') {
    html += renderCatDetail(filteredTxs);
  }

  html += `</div>`;
  return html;
}

function renderCalGrid(year, month, txs) {
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDow = new Date(year, month, 1).getDay();
  const today = new Date();
  const isThisMonth = today.getFullYear() === year && today.getMonth() === month;
  const todayDate = today.getDate();

  const dailyExp = {}, dailyInc = {};
  txs.forEach(tx => {
    const day = parseInt(tx.date.slice(8, 10));
    if (tx.type === 'expense') dailyExp[day] = (dailyExp[day] || 0) + tx.amount;
    else dailyInc[day] = (dailyInc[day] || 0) + tx.amount;
  });

  const dows = ['일','월','화','수','목','금','토'];
  let html = `<div class="cal-grid">`;
  dows.forEach(d => { html += `<div class="cal-dow">${d}</div>`; });
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="cal-cell empty"><div class="cal-day">&nbsp;</div></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = isThisMonth && d === todayDate;
    const isSel = selectedCalDay === d;
    const exp = dailyExp[d];
    const inc = dailyInc[d];
    html += `<div class="cal-cell${isToday ? ' today' : ''}${isSel ? ' selected' : ''}" onclick="selectCalDay(${d})">`;
    html += `<div class="cal-day">${d}</div>`;
    if (inc) html += `<div class="cal-amt income">+${fmt(inc)}</div>`;
    if (exp) html += `<div class="cal-amt">-${fmt(exp)}</div>`;
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

// ── Who bar chart ────────────────────────────────
function renderWhoChart(filteredTxs) {
  const whoAmts = {};
  const WHO_BAR_COLORS = { '남편':'#5B6EF5', '아내':'#E85D8A', '딸':'#2ECC8A', '시댁':'#A78BFA', '처가':'#F5A623', '우리':'#5BCCCC' };
  filteredTxs.forEach(tx => { whoAmts[tx.who] = (whoAmts[tx.who] || 0) + tx.amount; });
  const maxAmt = Math.max(...Object.values(whoAmts), 1);
  let html = `<div class="who-chart">`;
  WHOS.forEach(w => {
    const amt = whoAmts[w] || 0;
    if (!amt) return;
    const pct = Math.max(amt / maxAmt * 100, 3);
    const color = WHO_BAR_COLORS[w] || 'var(--accent)';
    html += `<div class="who-bar-row" onclick="calSelectedWho='${w}';pushCalMode('who-detail')">
      <div class="who-bar-name">${w}</div>
      <div class="who-bar-track"><div class="who-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="who-bar-amt">${fmt(amt)}원</div>
    </div>`;
  });
  if (!Object.keys(whoAmts).length) html += `<div style="text-align:center;color:var(--text3);font-size:12px;padding:16px">${calTxType==='expense'?'지출':'수입'} 내역이 없어요</div>`;
  html += `</div>`;
  return html;
}

// ── Who detail (category breakdown) ──────────────
function renderWhoDetail(filteredTxs) {
  const whoTxs = filteredTxs.filter(t => t.who === calSelectedWho);
  const catAmts = {};
  whoTxs.forEach(tx => { catAmts[tx.category] = (catAmts[tx.category] || 0) + tx.amount; });
  const total = whoTxs.reduce((s, t) => s + t.amount, 0);
  const isExp = calTxType === 'expense';
  const label = isExp ? '총 지출' : '총 수입';
  const color = isExp ? 'var(--red)' : 'var(--green)';

  let html = `<div style="font-size:12px;color:var(--text2);margin-bottom:10px">${label} <b style="color:${color}">${fmt(total)}원</b> · ${whoTxs.length}건</div>`;
  const sorted = Object.entries(catAmts).sort((a, b) => b[1] - a[1]);
  const maxAmt = sorted.length ? sorted[0][1] : 1;
  html += `<div class="who-chart">`;
  sorted.forEach(([cat, amt]) => {
    const pct = Math.max(amt / maxAmt * 100, 3);
    html += `<div class="who-bar-row">
      <div class="who-bar-name" style="font-size:14px">${ICONS[cat] || '📝'}</div>
      <div class="who-bar-track"><div class="who-bar-fill" style="width:${pct}%;background:var(--accent)">${cat}</div></div>
      <div class="who-bar-amt">${fmt(amt)}원</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// ── Category grid (analysis view) ────────────────
function renderCatAnalysis(expTxs) {
  const catAmts = {};
  expTxs.forEach(tx => { catAmts[tx.category] = (catAmts[tx.category] || 0) + tx.amount; });
  const sorted = Object.entries(catAmts).sort((a, b) => b[1] - a[1]);

  if (!sorted.length) return `<div style="text-align:center;color:var(--text3);font-size:12px;padding:16px">${calTxType==='expense'?'지출':'수입'} 내역이 없어요</div>`;

  let html = `<div class="cat-grid">`;
  sorted.forEach(([cat, amt]) => {
    html += `<div class="cat-box" onclick="calSelectedCat='${cat}';pushCalMode('cat-detail')">
      <div class="cat-box-icon">${ICONS[cat] || '📝'}</div>
      <div class="cat-box-name">${cat}</div>
      <div class="cat-box-amt">${fmt(amt)}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// ── Category detail ──────────────────────────────
function renderCatDetail(filteredTxs) {
  const catTxs = filteredTxs.filter(t => t.category === calSelectedCat);
  const total = catTxs.reduce((s, t) => s + t.amount, 0);
  const isExp = calTxType === 'expense';
  const label = isExp ? '총 지출' : '총 수입';
  const color = isExp ? 'var(--red)' : 'var(--green)';

  let html = `<div style="font-size:12px;color:var(--text2);margin-bottom:10px">${label} <b style="color:${color}">${fmt(total)}원</b> · ${catTxs.length}건</div>`;
  html += `<div class="tx-list">`;
  catTxs.forEach(tx => {
    const whoBg = WHO_COLORS[tx.who] || 'var(--surface2)';
    const whoTxt = WHO_TEXT[tx.who] || 'var(--text2)';
    const typeBadge = isExp ? `<span class="badge ${tx.cost_type === '고정비' ? 'badge-fixed' : 'badge-var'}">${tx.cost_type}</span>` : '';
    const sign = isExp ? '-' : '+';
    const amtColor = isExp ? 'var(--text)' : 'var(--green)';
    html += `<div class="tx-item">
      <div class="tx-left"><div><div class="tx-title">${tx.memo || tx.category} ${typeBadge} <span class="badge" style="background:${whoBg};color:${whoTxt};border:none">${tx.who}</span></div>
        <div class="tx-meta">${tx.payment} · ${String(tx.date).slice(5)}</div></div></div>
      <div class="tx-right"><div class="tx-amount" style="color:${amtColor}">${sign}${fmt(tx.amount)}</div></div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// ── Calendar day select ──────────────────────────
function selectCalDay(day) {
  selectedCalDay = (selectedCalDay === day) ? null : day;
  render();
}

function renderDayDetail(year, month, txs) {
  if (selectedCalDay === null) return '';
  const dayStr = String(selectedCalDay).padStart(2, '0');
  const monthStr = String(month + 1).padStart(2, '0');
  const dayTxs = txs.filter(tx => {
    const d = new Date(tx.date);
    return d.getFullYear() === year && d.getMonth() === month && d.getDate() === selectedCalDay;
  });

  const totalExp = dayTxs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const totalInc = dayTxs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);

  let html = `<div class="cal-day-detail">
    <div class="cal-day-detail-header">
      <div class="cal-day-detail-title">${monthStr}/${dayStr} 내역${dayTxs.length ? ` · ${dayTxs.length}건` : ''}</div>
      <button class="cal-day-detail-close" onclick="selectedCalDay=null;render()">✕</button>
    </div>`;

  if (!dayTxs.length) {
    html += `<div style="text-align:center;color:var(--text3);font-size:12px;padding:10px 0">내역이 없어요</div>`;
  } else {
    if (totalInc) html += `<div style="font-size:11px;color:var(--green);margin-bottom:6px">수입 +${fmt(totalInc)}원</div>`;
    if (totalExp) html += `<div style="font-size:11px;color:var(--red);margin-bottom:8px">지출 -${fmt(totalExp)}원</div>`;
    html += `<div class="tx-list">`;
    dayTxs.forEach(tx => {
      const icon = ICONS[tx.category] || '📝';
      const iconBg = tx.type === 'income' ? '#1A3D2E' : (tx.cost_type === '고정비' ? '#2A2460' : '#2A1A00');
      const amtColor = tx.type === 'income' ? 'var(--green)' : 'var(--text)';
      const amtSign = tx.type === 'income' ? '+' : '-';
      const typeBadge = tx.type === 'expense' ? `<span class="badge ${tx.cost_type === '고정비' ? 'badge-fixed' : 'badge-var'}">${tx.cost_type}</span>` : '';
      const whoBg = WHO_COLORS[tx.who] || 'var(--surface2)';
      const whoTxt = WHO_TEXT[tx.who] || 'var(--text2)';
      html += `<div class="tx-item">
        <div class="tx-left">
          <div class="tx-icon" style="background:${iconBg}">${icon}</div>
          <div>
            <div class="tx-title">${tx.category} ${typeBadge} <span class="badge" style="background:${whoBg};color:${whoTxt};border:none">${tx.who}</span></div>
            <div class="tx-meta">${tx.memo || ''} · ${tx.payment}</div>
          </div>
        </div>
        <div class="tx-right">
          <div class="tx-amount" style="color:${amtColor}">${amtSign}${fmt(tx.amount)}</div>
          <button class="del-btn" onclick="editTx(${tx.id})" style="color:var(--accent2);font-size:13px">✏️</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}
</script>
</body>
</html>
